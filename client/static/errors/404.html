<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Arkfile</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: var(--foam-1);
            max-width: 650px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
            background: var(--depth-1);
        }
        .container {
            background: var(--depth-3);
            border: 1px solid var(--depth-4);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 4px 20px color-mix(in srgb, var(--depth-1) 80%, transparent);
            margin-top: 2rem;
        }
        h1 {
            color: var(--salt);
            margin-bottom: 1rem;
        }
        .message {
            color: var(--foam-2);
            margin-bottom: 2rem;
        }
        .home-link {
            display: inline-block;
            background: var(--current-1);
            color: var(--salt);
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        .home-link:hover {
            background: var(--current-2);
            text-decoration: none;
        }
        .status {
            font-size: 0.9rem;
            color: var(--foam-2);
            margin-top: 2rem;
        }
        .error-code {
            font-family: monospace;
            background: var(--depth-2);
            color: var(--salt);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }
    </style>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <h1>Page Not Found</h1>
        <div class="message">
            <p>The page you're looking for doesn't exist or has been moved.</p>
            <p>Error Code: <span class="error-code">404</span></p>
        </div>
        <a href="/" class="home-link">Return to Home</a>
    </div>
</body>
</html>
