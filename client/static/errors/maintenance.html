<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Maintenance - Arkfile</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: var(--foam-1);
            max-width: 650px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
            background: var(--depth-1);
        }
        .container {
            background: var(--depth-3);
            border: 1px solid var(--depth-4);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 4px 20px color-mix(in srgb, var(--depth-1) 80%, transparent);
            margin-top: 2rem;
        }
        h1 {
            color: var(--salt);
            margin-bottom: 1rem;
        }
        .message {
            color: var(--foam-2);
            margin-bottom: 2rem;
        }
        .alternative {
            background: var(--depth-2);
            color: var(--foam-1);
            border: 1px solid var(--depth-4);
            padding: 1rem;
            border-radius: 4px;
            margin-top: 2rem;
        }
        a {
            color: var(--current-2);
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .status {
            font-size: 0.9rem;
            color: var(--foam-2);
            margin-top: 2rem;
        }
    </style>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <div class="container">
        <h1>Service Maintenance</h1>
        <div class="message">
            The requested environment is currently undergoing maintenance or is temporarily unavailable.
        </div>
        <div class="alternative" id="alternative-env">
            <!-- This will be populated by Caddy's response handler -->
        </div>
        <div class="status">
            <p>Status: Maintenance Mode</p>
            <p>If you believe this is an error, please contact support at: arkfile [at] pm [dot] me</p>
        </div>
    </div>
</body>
</html>
