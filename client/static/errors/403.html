<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Unavailable</title>
    <style>
        :root {
            --depth-1: #060d1a;
            --depth-3: #112240;
            --depth-4: #1e3a5f;
            --phosphor: #f0a500;
            --foam-1: #cce7ff;
            --foam-2: #8ab8d8;
            --salt: #ffffff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--depth-1);
            color: var(--foam-1);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            text-align: center;
            max-width: 480px;
        }
        .status-icon {
            font-size: 3rem;
            color: var(--phosphor);
            margin-bottom: 0.5rem;
        }
        h1 {
            color: var(--salt);
            font-size: 1.4rem;
            margin-bottom: 1rem;
        }
        p {
            color: var(--foam-2);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-icon">[!]</div>
        <h1>Resource Unavailable</h1>
        <p>File is no longer accessible from this share link. It may have expired, been revoked, or reached its download limit.</p>
    </div>
</body>
</html>
