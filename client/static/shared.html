<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkfile - Shared File</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .card {
            background: var(--depth-3);
            color: var(--salt);
            border-radius: 8px;
            border: 1px solid var(--depth-4);
            box-shadow: 0 4px 20px color-mix(in srgb, var(--depth-1) 80%, transparent);
            margin-bottom: 20px;
            padding: 20px;
        }
        .card h2,
        .card h3,
        .card label,
        .card strong {
            color: var(--salt);
        }
        .card p,
        .card span,
        .card div {
            color: var(--foam-2);
        }
        .card input,
        .card select,
        .card button {
            color: inherit;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>Arkfile</h1>
            <nav>
                <a href="/">Home</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="card">
            <div id="share-access-container">
                <h2>Shared File</h2>
                <p>Loading...</p>
            </div>
        </div>
    </main>

    <!-- Compiled TypeScript application -->
    <script src="/js/dist/app.js"></script>
    <!-- Share page initialization (external to comply with CSP) -->
    <script src="/js/shared-init.js"></script>
</body>
</html>
